<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura com Envoy, Istio e duas aplicações Quarkus</title>
  <desc id="desc">Diagrama mostrando cliente, Istio Ingress Gateway, dois pods Quarkus com sidecar Envoy, o plano de controle Istio e observabilidade.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155" />
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#059669" />
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#d97706" />
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
    <style>
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 600 22px Inter, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 18px Inter, Arial, sans-serif; fill: #334155; }
      .tiny { font: 500 16px Inter, Arial, sans-serif; fill: #475569; }
      .boxTitle { font: 700 24px Inter, Arial, sans-serif; fill: #0f172a; }
      .boxText { font: 500 18px Inter, Arial, sans-serif; fill: #334155; }
      .note { font: 600 16px Inter, Arial, sans-serif; fill: #2563eb; letter-spacing: .02em; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="920" rx="28" fill="url(#bg)" />

  <text x="80" y="72" class="title">Envoy + Istio em microsserviços com duas apps Quarkus</text>
  <text x="80" y="108" class="subtitle">O app fala HTTP/gRPC normal; o mesh injeta proxy, aplica políticas e coleta telemetria.</text>

  <!-- control plane -->
  <rect x="550" y="140" width="500" height="110" rx="22" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
  <text x="800" y="185" text-anchor="middle" class="boxTitle">Istiod / Control Plane</text>
  <text x="800" y="218" text-anchor="middle" class="boxText">xDS, certificados, políticas, rotas e discovery</text>

  <!-- client -->
  <rect x="80" y="320" width="230" height="120" rx="22" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
  <text x="195" y="365" text-anchor="middle" class="boxTitle">Cliente / API Gateway</text>
  <text x="195" y="398" text-anchor="middle" class="boxText">requisição externa</text>

  <!-- ingress gateway -->
  <rect x="360" y="300" width="320" height="160" rx="24" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
  <text x="520" y="348" text-anchor="middle" class="boxTitle">Istio Ingress Gateway</text>
  <text x="520" y="380" text-anchor="middle" class="boxText">Envoy na borda do cluster</text>
  <text x="520" y="414" text-anchor="middle" class="small">TLS, roteamento, autenticação, observabilidade</text>

  <!-- service pods -->
  <rect x="770" y="300" width="300" height="240" rx="24" fill="#ecfeff" stroke="#06b6d4" stroke-width="3"/>
  <text x="920" y="346" text-anchor="middle" class="boxTitle">orders-service</text>
  <text x="920" y="382" text-anchor="middle" class="boxText">Quarkus app</text>
  <rect x="815" y="410" width="210" height="92" rx="18" fill="#cffafe" stroke="#06b6d4" stroke-width="2"/>
  <text x="920" y="446" text-anchor="middle" class="boxTitle">Envoy sidecar</text>
  <text x="920" y="476" text-anchor="middle" class="tiny">mTLS, retries, timeouts, métricas</text>

  <rect x="1140" y="300" width="300" height="240" rx="24" fill="#f0fdf4" stroke="#22c55e" stroke-width="3"/>
  <text x="1290" y="346" text-anchor="middle" class="boxTitle">payments-service</text>
  <text x="1290" y="382" text-anchor="middle" class="boxText">Quarkus app</text>
  <rect x="1185" y="410" width="210" height="92" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="1290" y="446" text-anchor="middle" class="boxTitle">Envoy sidecar</text>
  <text x="1290" y="476" text-anchor="middle" class="tiny">políticas, tracing, circuit breaking</text>

  <!-- observability -->
  <rect x="560" y="640" width="480" height="130" rx="24" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
  <text x="800" y="688" text-anchor="middle" class="boxTitle">Observabilidade</text>
  <text x="800" y="720" text-anchor="middle" class="boxText">Prometheus • Grafana • Jaeger • Kiali</text>
  <text x="800" y="752" text-anchor="middle" class="tiny">telemetria gerada pelos proxies, não pelo código de negócio</text>

  <!-- arrows -->
  <line x1="310" y1="380" x2="360" y2="380" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="330" y="352" text-anchor="middle" class="note">HTTP/TLS</text>

  <line x1="680" y1="380" x2="770" y2="380" stroke="#d97706" stroke-width="4" marker-end="url(#arrowOrange)"/>
  <text x="725" y="352" text-anchor="middle" class="note">mTLS / policy</text>

  <line x1="1070" y1="380" x2="1140" y2="380" stroke="#059669" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <line x1="920" y1="300" x2="920" y2="250" stroke="#7c3aed" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <line x1="1290" y1="300" x2="1290" y2="250" stroke="#7c3aed" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="1075" y="270" text-anchor="middle" class="note">xDS / certificados / rotas</text>

  <line x1="920" y1="540" x2="920" y2="640" stroke="#334155" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <line x1="1290" y1="540" x2="1290" y2="640" stroke="#334155" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="1170" y="595" text-anchor="middle" class="note">métricas / traces / logs</text>

  <!-- service labels -->
  <text x="1040" y="585" class="tiny">O tráfego entre serviços passa pelo proxy de saída e pelo proxy de entrada.</text>
  <text x="80" y="835" class="subtitle">Figura simplificada para mostrar o papel do Envoy como data plane e do Istio como control plane.</text>
</svg>
